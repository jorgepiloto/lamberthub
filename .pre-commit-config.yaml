repos:

 
- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: v0.6.5
  hooks:
    - id: ruff
      args: [ --fix ]
    - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: v2.3.0
  hooks:
  - id: codespell
    args: ["--ignore-words=./doc/styles/config/vocabularies/LAMBERTHUB/accept.txt"]

- repo: https://github.com/econchick/interrogate
  rev: 1.7.0
  hooks:
  - id: interrogate
    args: [src]
    pass_filenames: false
