name: CI
on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "*"
    branches:
      - main

env:
  MAIN_PYTHON_VERSION: '3.12'
  LIBRARY_NAME: 'lamberthub'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write


jobs:

  code-style:
    name: "Code style"
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/code-style@v10.3.2

  doc-style:
    name: "Doc style"
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/doc-style@v10.3.2
        with:
          files: "README.md"
          token: ${{ secrets.GITHUB_TOKEN }}

  tests:
    name: "Tests"
    runs-on: ${{ matrix.os }}
    needs: [code-style, doc-style]
    strategy:
      matrix:
        os: [ubuntu-latest]
        cfg:
          - {python-version: '3.12', extra-args: '-m "not benchmark" --cov=lamberthub --cov-report=term --cov-report=html:.cov/html'}
          - {python-version: '3.13', extra-args: '-m "not benchmark"'}
          - {python-version: '3.14', extra-args: '-m "not benchmark"'}
      fail-fast: false
    steps:
      - name: "Run tests"
        uses: ansys/actions/tests-pytest@v10.3.2
        with:
          python-version: ${{ matrix.cfg.python-version }}
          optional-dependencies-name: ''
          group-dependencies-name: tests
          pytest-extra-args: ${{ matrix.cfg.extra-args }}
        env:
          # Do not run Numba when measuring code coverage to get accurate values
          NUMBA_DISABLE_JIT: 1

      - name: "Upload coverage"
        uses: codecov/codecov-action@v6
        if: matrix.cfg.python-version == env.MAIN_PYTHON_VERSION && matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    name: "Benchmarks"
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      matrix:
        cfg:
          - {name: zero-revolution, selector: zero_revolution_general}
          - {name: multi-revolution, selector: multi_revolution_general}
          - {name: robust, selector: robust_general}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Install tox"
        run: python -m pip install tox

      - name: "Run benchmarks"
        run: tox -e benchmark -- -k "${{ matrix.cfg.selector }}" --benchmark-json=.benchmarks/${{ matrix.cfg.name }}.json

      - name: "Upload benchmark report"
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-report-${{ matrix.cfg.name }}
          path: .benchmarks/${{ matrix.cfg.name }}.json

  build-library:
    name: "Build library"
    runs-on: ubuntu-latest
    needs: [tests, benchmarks]
    steps:
      - uses: ansys/actions/build-library@v10.3.2
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  release:
    name: "Release"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: build-library
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:

      - name: "Release to the public PyPI repository"
        uses: ansys/actions/release-pypi-public@v10.3.2
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          use-trusted-publisher: true

      - name: "Download distribution artifacts"
        uses: actions/download-artifact@v8

      - name: "Release to GitHub"
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/${{ env.LIBRARY_NAME }}-artifacts/*.whl
            dist/${{ env.LIBRARY_NAME }}-artifacts/*.tar.gz
