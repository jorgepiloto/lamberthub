name: CI/CD
on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "*"
    branches:
      - main

env:
  MAIN_PYTHON_VERSION: '3.12'
  LIBRARY_NAME: 'lamberthub'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write


jobs:

  code-style:
    name: "Code Style"
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/code-style@v10.3.2

  doc-style:
    name: "Doc Style"
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/doc-style@v10.3.2
        with:
          files: "README.md"
          token: ${{ secrets.GITHUB_TOKEN }}

  tests:
    name: "Tests / Python ${{ matrix.cfg.python-version }}"
    runs-on: ${{ matrix.os }}
    needs: [code-style, doc-style]
    strategy:
      matrix:
        os: [ubuntu-latest]
        cfg:
          - {python-version: '3.12', extra-args: '--cov=lamberthub --cov-report=term --cov-report=html:.cov/html'}
          - {python-version: '3.13', extra-args: ''}
          - {python-version: '3.14', extra-args: ''}
      fail-fast: false
    steps:
      - name: "Run tests (Python ${{ matrix.cfg.python-version }})"
        uses: ansys/actions/tests-pytest@v10.3.2
        with:
          python-version: ${{ matrix.cfg.python-version }}
          optional-dependencies-name: ''
          group-dependencies-name: tests
          pytest-extra-args: ${{ matrix.cfg.extra-args }}
        env:
          # Do not run Numba when measuring code coverage to get accurate values
          NUMBA_DISABLE_JIT: 1

      - name: "Upload coverage"
        uses: codecov/codecov-action@v7
        if: matrix.cfg.python-version == env.MAIN_PYTHON_VERSION && matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    name: "Benchmarks / ${{ matrix.cfg.name }}"
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      matrix:
        cfg:
          - {name: zero-rev-nominal, selector: zero_revolution_nominal}
          - {name: zero-rev-general, selector: zero_revolution_general}
          - {name: zero-rev-hyperbolic, selector: zero_revolution_hyperbolic}
          - {name: multi-rev-m1, selector: multi_revolution_m1}
          - {name: multi-rev-hard, selector: multi_revolution_hard}
          - {name: robust-zero-rev, selector: robust_zero_revolution}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Install tox"
        run: python -m pip install tox

      - name: "Run benchmarks (${{ matrix.cfg.name }})"
        run: tox -e benchmark -- -k "${{ matrix.cfg.selector }}" --benchmark-json=.benchmarks/${{ matrix.cfg.name }}.json

      - name: "Upload benchmark report (${{ matrix.cfg.name }})"
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report-${{ matrix.cfg.name }}
          path: .benchmarks/${{ matrix.cfg.name }}.json

  update-performance-report:
    name: "Update Performance Report"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: benchmarks
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: "Download benchmark reports"
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-report-*
          path: .benchmarks
          merge-multiple: true

      - name: "Generate performance report"
        run: python scripts/generate_benchmark_report.py

      - name: "Commit performance report"
        run: |
          if git diff --quiet README.md; then
            echo "No performance report changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update performance comparison [skip ci]"
          git push origin HEAD:main

  build-library:
    name: "Build Library"
    runs-on: ubuntu-latest
    needs: [tests, benchmarks]
    steps:
      - uses: ansys/actions/build-library@v10.3.2
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  release:
    name: "Release to PyPI"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: build-library
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:

      - name: "Release to the public PyPI repository"
        uses: ansys/actions/release-pypi-public@v10.3.2
        with:
          library-name: ${{ env.LIBRARY_NAME }}
          use-trusted-publisher: true

      - name: "Download distribution artifacts"
        uses: actions/download-artifact@v8

      - name: "Release to GitHub"
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/${{ env.LIBRARY_NAME }}-artifacts/*.whl
            dist/${{ env.LIBRARY_NAME }}-artifacts/*.tar.gz
